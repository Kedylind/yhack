name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements-dev.txt
      - name: Production requirements smoke (import app.main with requirements.txt only)
        run: |
          python -m venv .venv-prod
          .venv-prod/bin/pip install -r requirements.txt
          .venv-prod/bin/python -c "import app.main"
      - name: Pytest
        run: pytest
      - name: Docker build API image
        run: docker build -t yhack-api:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
