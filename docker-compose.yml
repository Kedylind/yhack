services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: boston_gi_demo
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      - mongo

volumes:
  mongo_data:
